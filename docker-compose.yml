services:
  siphon:
    build: .
    ports:
      - "8000:8000"
    environment:
      SIPHON_PORT: "8000"
      SIPHON_MAX_WORKERS: "4"
      SIPHON_ALLOWED_S3_PREFIX: "bronze/"
      SIPHON_S3_SCHEME: "http"
      # PostgreSQL — required for UI, auth, pipelines and scheduling
      DATABASE_URL: "postgresql+asyncpg://siphon:siphon@postgres:5432/siphon"
      # Auth — change all three values before exposing to any network
      SIPHON_JWT_SECRET: "dev-jwt-secret-change-in-production"
      SIPHON_ENCRYPTION_KEY: "aMgwZ5VXJPcxLd3zoM510Dtb59-O6HhCUG8DhlZUiAo="
      # Bootstrap admin (only used when no users exist in the database)
      SIPHON_ADMIN_EMAIL: "admin@example.com"
      SIPHON_ADMIN_PASSWORD: "changeme123"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: siphon
      POSTGRES_USER: siphon
      POSTGRES_PASSWORD: siphon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siphon -d siphon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
