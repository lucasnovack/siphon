services:
  siphon:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SIPHON_JWT_SECRET: ${SIPHON_JWT_SECRET}
      SIPHON_ENCRYPTION_KEY: ${SIPHON_ENCRYPTION_KEY}
      SIPHON_ADMIN_EMAIL: ${SIPHON_ADMIN_EMAIL}
      SIPHON_ADMIN_PASSWORD: ${SIPHON_ADMIN_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      SIPHON_PORT: ${SIPHON_PORT}
      SIPHON_MAX_WORKERS: ${SIPHON_MAX_WORKERS}
      SIPHON_ALLOWED_S3_PREFIX: ${SIPHON_ALLOWED_S3_PREFIX}
      SIPHON_S3_SCHEME: ${SIPHON_S3_SCHEME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  siphon-worker:
    build: .
    command: >
      celery -A siphon.celery_app worker
      --loglevel=info
      -Q high,normal,low
      --concurrency=4
      --without-gossip
      --without-mingle
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SIPHON_ENCRYPTION_KEY: ${SIPHON_ENCRYPTION_KEY}
      SIPHON_ALLOWED_S3_PREFIX: ${SIPHON_ALLOWED_S3_PREFIX}
      SIPHON_S3_SCHEME: ${SIPHON_S3_SCHEME}
      REDIS_URL: ${REDIS_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    stop_grace_period: 300s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: siphon
      POSTGRES_USER: siphon
      POSTGRES_PASSWORD: siphon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siphon -d siphon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
