# Isolated services for CI — no host port bindings, accessed by service name
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: siphon
      MYSQL_PASSWORD: siphon
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usiphon", "-psiphon"]
      interval: 5s
      timeout: 5s
      retries: 15

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: siphon
      POSTGRES_PASSWORD: siphon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siphon -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15

  sftp:
    image: atmoz/sftp:latest
    command: "siphon:siphon:::upload"
